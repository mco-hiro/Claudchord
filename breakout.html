<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブロック崩し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a18;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    h1 { font-size: 20px; margin-bottom: 6px; color: #c4b5fd; letter-spacing: 2px; }
    #info { font-size: 13px; color: #888; margin-bottom: 8px; }
    #info span { color: white; font-weight: bold; }
    #drillLabel {
      font-size: 13px; font-weight: bold; color: #ffd32a;
      margin-left: 14px; opacity: 0; transition: opacity 0.15s;
    }
    canvas { border-radius: 10px; border: 2px solid #1e1e3a; display: block; }
    #message { margin-top: 12px; font-size: 20px; font-weight: bold; min-height: 28px; color: #c4b5fd; }
    #startBtn {
      margin-top: 8px; padding: 10px 40px; font-size: 15px; font-weight: bold;
      background: #7c3aed; color: white; border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.2s;
    }
    #startBtn:hover { background: #6d28d9; }
    .hint { margin-top: 6px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <h1>🧱 ブロック崩し</h1>
  <div id="info">
    スコア: <span id="score">0</span>
    &nbsp;&nbsp; 残り: <span id="lives">❤️❤️❤️</span>
    <span id="drillLabel">🔥 貫通中！</span>
  </div>
  <canvas id="canvas" width="520" height="540"></canvas>
  <div id="message">スタートを押してね！</div>
  <button id="startBtn" onclick="startGame()">スタート</button>
  <p class="hint">← → キー または マウスでパドルを動かす｜打ち返すたびに貫通ドリル発動！</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const CW = canvas.width, CH = canvas.height;

    // ===== ブロック設定 =====
    const ROWS = 16, COLS = 13;
    const BW = 36, BH = 20, BGAP = 4;
    const BOX = 2, BOY = 18;
    // 幅チェック: 2 + 12*(36+4) + 36 = 2+480+36 = 518 ✓

    const ROW_COLORS = [
      '#ff6b6b','#ff8e53','#ff9f43','#ffd32a',
      '#bcf25d','#0be881','#00d2d3','#4bcffa',
      '#74b9ff','#a29bfe','#fd79a8','#e84393',
      '#6c5ce7','#00b894','#fdcb6e','#e17055'
    ];

    // ===== 定数 =====
    const PADDLE_W = 130, PADDLE_H = 12;
    const BALL_R = 7, BASE_SPEED = 4.2;

    // ===== 状態 =====
    let paddle, ball, ballTrail, blocks, debris;
    let score, lives, animId, running;
    let shakeX = 0, shakeY = 0, flashAlpha = 0;
    let keys = {};
    const drillLabel = document.getElementById('drillLabel');

    // ===== 入力 =====
    canvas.addEventListener('mousemove', e => {
      if (!running) return;
      const rect = canvas.getBoundingClientRect();
      paddle.x = Math.max(0, Math.min(CW - PADDLE_W, e.clientX - rect.left - PADDLE_W / 2));
    });
    document.addEventListener('keydown', e => { keys[e.key] = true; });
    document.addEventListener('keyup',   e => { keys[e.key] = false; });

    // ===== ゲーム開始 =====
    function startGame() {
      if (animId) cancelAnimationFrame(animId);
      score = 0; lives = 3; running = true;
      debris = []; ballTrail = [];
      shakeX = 0; shakeY = 0; flashAlpha = 0;

      paddle = { x: CW / 2 - PADDLE_W / 2, y: CH - 30 };

      // ブロック生成（HPランダム 1〜99）
      blocks = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const hp = Math.ceil(Math.random() * 99);
          blocks.push({
            x: BOX + c * (BW + BGAP),
            y: BOY + r * (BH + BGAP),
            hp, maxHp: hp,
            alive: true,
            baseColor: ROW_COLORS[r],
            hitFlash: 0,
            hitCooldown: 0
          });
        }
      }

      launchBall(true);
      document.getElementById('message').textContent = '';
      document.getElementById('startBtn').textContent = 'もう一度';
      updateInfo();
      loop();
    }

    function launchBall(penetrating) {
      const vx = BASE_SPEED * (Math.random() > 0.5 ? 0.6 : -0.6);
      ball = {
        x: CW / 2,
        y: CH - 80,
        vx,
        vy: -Math.sqrt(BASE_SPEED * BASE_SPEED - vx * vx),
        penetrating
      };
      ballTrail = [];
      drillLabel.style.opacity = penetrating ? '1' : '0';
    }

    // ===== メインループ =====
    function loop() { update(); draw(); if (running) animId = requestAnimationFrame(loop); }

    // ===== 更新 =====
    function update() {
      if (keys['ArrowLeft'])  paddle.x = Math.max(0, paddle.x - 7);
      if (keys['ArrowRight']) paddle.x = Math.min(CW - PADDLE_W, paddle.x + 7);

      ballTrail.unshift({ x: ball.x, y: ball.y });
      if (ballTrail.length > 18) ballTrail.pop();

      ball.x += ball.vx;
      ball.y += ball.vy;

      // 壁反射
      if (ball.x - BALL_R < 0)   { ball.x = BALL_R;      ball.vx =  Math.abs(ball.vx); }
      if (ball.x + BALL_R > CW)  { ball.x = CW - BALL_R; ball.vx = -Math.abs(ball.vx); }

      // 天井 → 貫通解除
      if (ball.y - BALL_R < 0) {
        ball.y = BALL_R; ball.vy = Math.abs(ball.vy);
        ball.penetrating = false;
        drillLabel.style.opacity = '0';
      }

      // 落下
      if (ball.y - BALL_R > CH) {
        lives--;
        updateInfo();
        if (lives <= 0) {
          running = false;
          document.getElementById('message').textContent = 'ゲームオーバー... 😢';
          return;
        }
        launchBall(true);
        return;
      }

      // パドル反射 → 貫通ON
      if (
        ball.vy > 0 &&
        ball.y + BALL_R >= paddle.y &&
        ball.y + BALL_R <= paddle.y + PADDLE_H + 4 &&
        ball.x >= paddle.x && ball.x <= paddle.x + PADDLE_W
      ) {
        ball.vy = -Math.abs(ball.vy);
        ball.vx = ((ball.x - (paddle.x + PADDLE_W / 2)) / (PADDLE_W / 2)) * 6;
        ball.penetrating = true;
        drillLabel.style.opacity = '1';
      }

      // クールダウン・フラッシュ更新
      for (const b of blocks) {
        if (b.hitCooldown > 0) b.hitCooldown--;
        if (b.hitFlash   > 0) b.hitFlash--;
      }

      // ブロック衝突
      for (const b of blocks) {
        if (!b.alive) continue;
        if (
          ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + BW &&
          ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + BH
        ) {
          if (ball.penetrating) {
            // 貫通モード：はね返さずHP-1
            if (b.hitCooldown === 0) {
              hitBlock(b);
              b.hitCooldown = 12;
            }
          } else {
            // 通常モード：はね返してHP-1
            const ol  = (ball.x + BALL_R) - b.x;
            const or2 = (b.x + BW) - (ball.x - BALL_R);
            const ot  = (ball.y + BALL_R) - b.y;
            const ob  = (b.y + BH) - (ball.y - BALL_R);
            if (Math.min(ol, or2) < Math.min(ot, ob)) ball.vx *= -1;
            else ball.vy *= -1;
            hitBlock(b);
            break;
          }
        }
      }

      // デブリ物理
      for (const d of debris) {
        d.x += d.vx; d.y += d.vy;
        d.vy += 0.28; d.vx *= 0.98;
        d.rotation += d.rotSpeed;
        d.alpha -= 0.02;
      }
      debris = debris.filter(d => d.alpha > 0 && d.y < CH + 80);

      flashAlpha *= 0.82;
      shakeX *= 0.72; shakeY *= 0.72;

      if (running && blocks.every(b => !b.alive)) {
        running = false;
        document.getElementById('message').textContent = 'クリア！全部崩した！🎉';
      }
    }

    function hitBlock(b) {
      b.hp--;
      b.hitFlash = 7;
      shakeX += (Math.random() - 0.5) * 2.5;
      shakeY += (Math.random() - 0.5) * 2.5;

      if (b.hp <= 0) {
        b.alive = false;
        score += 10;
        updateInfo();
        spawnDebris(b);
        flashAlpha = Math.min(flashAlpha + 0.1, 0.45);
        shakeX += (Math.random() - 0.5) * 10;
        shakeY += (Math.random() - 0.5) * 10;
      }
    }

    function spawnDebris(b) {
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        debris.push({
          x: b.x + Math.random() * BW, y: b.y + Math.random() * BH,
          w: 3 + Math.random() * 8, h: 2 + Math.random() * 4,
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1.5,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.28,
          color: b.baseColor, alpha: 1
        });
      }
    }

    // ===== 描画 =====
    function draw() {
      ctx.clearRect(0, 0, CW, CH);

      ctx.save();
      ctx.translate(
        shakeX + (Math.random() - 0.5) * Math.abs(shakeX) * 0.4,
        shakeY + (Math.random() - 0.5) * Math.abs(shakeY) * 0.4
      );

      // ブロック描画
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 10px monospace';

      for (const b of blocks) {
        if (!b.alive) continue;
        const ratio = b.hp / b.maxHp;
        const flashing = b.hitFlash > 0;

        // ブロック本体（HPが減るほど暗くなる）
        ctx.globalAlpha = 0.22 + 0.78 * ratio;
        ctx.fillStyle = flashing ? 'white' : b.baseColor;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, BW, BH, 3);
        ctx.fill();
        ctx.globalAlpha = 1;

        // HP数字（白文字＋黒縁）
        const tx = b.x + BW / 2, ty = b.y + BH / 2 + 1;
        ctx.strokeStyle = 'rgba(0,0,0,0.85)';
        ctx.lineWidth = 2.5;
        ctx.fillStyle   = flashing ? b.baseColor : 'white';
        ctx.strokeText(b.hp, tx, ty);
        ctx.fillText  (b.hp, tx, ty);
      }

      // デブリ
      for (const d of debris) {
        ctx.save();
        ctx.globalAlpha = d.alpha;
        ctx.fillStyle = d.color;
        ctx.translate(d.x, d.y);
        ctx.rotate(d.rotation);
        ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
        ctx.restore();
      }

      // ボールのトレイル
      for (let i = ballTrail.length - 1; i >= 0; i--) {
        const t = ballTrail[i];
        const ratio = 1 - i / ballTrail.length;
        ctx.globalAlpha = ratio * 0.5;
        ctx.fillStyle = ball.penetrating
          ? `hsl(${30 + i * 4}, 100%, 65%)`
          : `hsl(${260 + i * 5}, 80%, 75%)`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, BALL_R * ratio * 0.9, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // パドル
      const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + PADDLE_H);
      grad.addColorStop(0, '#c4b5fd');
      grad.addColorStop(1, '#7c3aed');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, PADDLE_W, PADDLE_H, 6);
      ctx.fill();

      // ボール（貫通中はオレンジに光る）
      ctx.shadowColor = ball.penetrating ? '#ff9f43' : 'rgba(255,255,255,0.9)';
      ctx.shadowBlur  = ball.penetrating ? 22 : 14;
      ctx.fillStyle   = ball.penetrating ? '#ffd32a' : 'white';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.restore();

      // フラッシュ
      if (flashAlpha > 0.01) {
        ctx.globalAlpha = flashAlpha;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, CW, CH);
        ctx.globalAlpha = 1;
      }
    }

    function updateInfo() {
      document.getElementById('score').textContent = score;
      document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
    }

    draw();
  </script>
</body>
</html>
