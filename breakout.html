<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブロック崩し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a18;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    h1 { font-size: 20px; margin-bottom: 6px; color: #c4b5fd; letter-spacing: 2px; }
    #info { font-size: 13px; color: #888; margin-bottom: 8px; }
    #info span { color: white; font-weight: bold; }
    #drillLabel {
      font-size: 13px; font-weight: bold;
      color: #ff9f43;
      margin-left: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    canvas { border-radius: 10px; border: 2px solid #1e1e3a; display: block; }
    #message { margin-top: 12px; font-size: 20px; font-weight: bold; min-height: 28px; color: #c4b5fd; }
    #startBtn {
      margin-top: 8px; padding: 10px 40px; font-size: 15px; font-weight: bold;
      background: #7c3aed; color: white; border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.2s;
    }
    #startBtn:hover { background: #6d28d9; }
    .hint { margin-top: 6px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <h1>🧱 ブロック崩し</h1>
  <div id="info">
    スコア: <span id="score">0</span>
    &nbsp;&nbsp; 残り: <span id="lives">❤️❤️❤️</span>
    <span id="drillLabel">🔥 貫通中！</span>
  </div>
  <canvas id="canvas" width="520" height="500"></canvas>
  <div id="message">スタートを押してね！</div>
  <button id="startBtn" onclick="startGame()">スタート</button>
  <p class="hint">← → キー または マウスでパドルを動かす｜パドルで打ち返すと貫通ドリル発動！</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const CW = canvas.width, CH = canvas.height;

    // ===== ブロック設定 =====
    const ROWS = 110, COLS = 104;   // 11440個
    const BW = 5, BH = 3;           // ブロックサイズ（ギャップなし）
    const BOX = 0, BOY = 16;        // 配置オフセット

    // 虹色グラデーション（行ごとに色相が変わる）
    const ROW_COLORS = Array.from({ length: ROWS }, (_, r) =>
      `hsl(${Math.round((r / ROWS) * 340)}, 88%, 62%)`
    );

    // ===== 定数 =====
    const PADDLE_W = 130, PADDLE_H = 12;
    const BALL_R   = 7;
    const BALL_SPEED = 4.2;

    // ===== 状態 =====
    let paddle, ball, ballTrail;
    let blockAlive;   // Uint8Array — 1=生存, 0=破壊済み
    let debris = [];
    let pendingBreaks = [];
    let score, lives, animId, running;
    let shakeX = 0, shakeY = 0, flashAlpha = 0;
    let keys = {};
    const drillLabel = document.getElementById('drillLabel');

    // ===== 入力 =====
    canvas.addEventListener('mousemove', e => {
      if (!running) return;
      const rect = canvas.getBoundingClientRect();
      paddle.x = Math.max(0, Math.min(CW - PADDLE_W, e.clientX - rect.left - PADDLE_W / 2));
    });
    document.addEventListener('keydown', e => { keys[e.key] = true; });
    document.addEventListener('keyup',   e => { keys[e.key] = false; });

    // ===== ゲーム開始 =====
    function startGame() {
      if (animId) cancelAnimationFrame(animId);
      score = 0; lives = 3; running = true;
      debris = []; ballTrail = []; pendingBreaks = [];
      shakeX = 0; shakeY = 0; flashAlpha = 0;

      paddle = { x: CW / 2 - PADDLE_W / 2, y: CH - 30 };

      blockAlive = new Uint8Array(ROWS * COLS).fill(1);

      launchBall(true);   // 最初は貫通モードで発射

      document.getElementById('message').textContent = '';
      document.getElementById('startBtn').textContent = 'もう一度';
      updateInfo();
      loop();
    }

    function launchBall(penetrating) {
      ball = {
        x: CW / 2,
        y: CH - 80,
        vx: BALL_SPEED * (Math.random() > 0.5 ? 0.8 : -0.8),
        vy: -BALL_SPEED,
        penetrating
      };
      ballTrail = [];
      drillLabel.style.opacity = penetrating ? '1' : '0';
    }

    // ===== メインループ =====
    function loop() {
      update();
      draw();
      if (running) animId = requestAnimationFrame(loop);
    }

    // ===== 更新 =====
    function update() {
      // キーボード
      if (keys['ArrowLeft'])  paddle.x = Math.max(0, paddle.x - 7);
      if (keys['ArrowRight']) paddle.x = Math.min(CW - PADDLE_W, paddle.x + 7);

      // トレイル記録
      ballTrail.unshift({ x: ball.x, y: ball.y });
      if (ballTrail.length > 20) ballTrail.pop();

      ball.x += ball.vx;
      ball.y += ball.vy;

      // 左右壁
      if (ball.x - BALL_R < 0)  { ball.x = BALL_R;      ball.vx =  Math.abs(ball.vx); }
      if (ball.x + BALL_R > CW) { ball.x = CW - BALL_R; ball.vx = -Math.abs(ball.vx); }

      // 天井 → 貫通モード解除
      if (ball.y - BALL_R < 0) {
        ball.y = BALL_R;
        ball.vy = Math.abs(ball.vy);
        if (ball.penetrating) {
          ball.penetrating = false;
          drillLabel.style.opacity = '0';
        }
      }

      // 落下
      if (ball.y - BALL_R > CH) {
        lives--;
        updateInfo();
        if (lives <= 0) {
          running = false;
          pendingBreaks = [];
          document.getElementById('message').textContent = 'ゲームオーバー... 😢';
          return;
        }
        launchBall(true);
        return;
      }

      // パドル反射 → 貫通モード ON
      if (
        ball.vy > 0 &&
        ball.y + BALL_R >= paddle.y &&
        ball.y + BALL_R <= paddle.y + PADDLE_H + 6 &&
        ball.x >= paddle.x && ball.x <= paddle.x + PADDLE_W
      ) {
        ball.vy = -Math.abs(ball.vy);
        const hit = (ball.x - (paddle.x + PADDLE_W / 2)) / (PADDLE_W / 2);
        ball.vx = hit * 6;
        if (!ball.penetrating) {
          ball.penetrating = true;
          drillLabel.style.opacity = '1';
        }
      }

      // ブロック衝突判定
      for (let i = 0; i < ROWS * COLS; i++) {
        if (!blockAlive[i]) continue;
        const r = (i / COLS) | 0;
        const c = i % COLS;
        const bx = BOX + c * BW;
        const by = BOY + r * BH;

        if (
          ball.x + BALL_R > bx && ball.x - BALL_R < bx + BW &&
          ball.y + BALL_R > by && ball.y - BALL_R < by + BH
        ) {
          if (ball.penetrating) {
            // 貫通：はね返さず破壊のみ
            destroyBlock(i, r, c, bx, by, false);
          } else {
            // 通常：はね返す
            const ol = (ball.x + BALL_R) - bx;
            const or2 = (bx + BW) - (ball.x - BALL_R);
            const ot = (ball.y + BALL_R) - by;
            const ob = (by + BH) - (ball.y - BALL_R);
            if (Math.min(ol, or2) < Math.min(ot, ob)) ball.vx *= -1;
            else ball.vy *= -1;
            destroyBlock(i, r, c, bx, by, true);
            break;
          }
        }
      }

      // 予約済み連鎖破壊
      const now = performance.now();
      for (let i = pendingBreaks.length - 1; i >= 0; i--) {
        const pb = pendingBreaks[i];
        if (now >= pb.time) {
          if (blockAlive[pb.idx]) {
            const r = (pb.idx / COLS) | 0;
            const c = pb.idx % COLS;
            destroyBlock(pb.idx, r, c, BOX + c * BW, BOY + r * BH, false);
          }
          pendingBreaks.splice(i, 1);
        }
      }

      // デブリ物理
      for (const d of debris) {
        d.x += d.vx; d.y += d.vy;
        d.vy += 0.28; d.vx *= 0.98;
        d.rotation += d.rotSpeed;
        d.alpha -= 0.022;
      }
      debris = debris.filter(d => d.alpha > 0 && d.y < CH + 60);

      // エフェクト減衰
      flashAlpha *= 0.8;
      shakeX *= 0.7;
      shakeY *= 0.7;

      // クリア判定
      if (running && blockAlive.every(v => v === 0)) {
        running = false;
        document.getElementById('message').textContent = 'クリア！全部崩した！🎉';
      }
    }

    function destroyBlock(idx, r, c, bx, by, fromBall) {
      blockAlive[idx] = 0;
      score += 10;
      updateInfo();
      spawnDebris(bx, by, ROW_COLORS[r]);

      const s = fromBall ? 3 : 1.5;
      shakeX += (Math.random() - 0.5) * s * 2;
      shakeY += (Math.random() - 0.5) * s * 2;

      // 衝撃波（貫通中は小さく、通常はやや大きく）
      const prob    = ball.penetrating ? 0.18 : 0.5;
      const maxRad  = ball.penetrating ? 1 : 2;
      if (Math.random() < prob) triggerShockwave(r, c, maxRad);
    }

    function triggerShockwave(cr, cc, maxRad) {
      let count = 0;
      for (let r2 = cr - maxRad; r2 <= cr + maxRad; r2++) {
        for (let c2 = cc - maxRad; c2 <= cc + maxRad; c2++) {
          if (r2 < 0 || r2 >= ROWS || c2 < 0 || c2 >= COLS) continue;
          const dist = Math.max(Math.abs(r2 - cr), Math.abs(c2 - cc));
          if (dist === 0) continue;
          const idx2 = r2 * COLS + c2;
          if (blockAlive[idx2] && Math.random() < 0.5) {
            pendingBreaks.push({ idx: idx2, time: performance.now() + dist * 60 + Math.random() * 40 });
            count++;
          }
        }
      }
      if (count >= 5) {
        flashAlpha = Math.min(flashAlpha + 0.3, 0.5);
        shakeX += (Math.random() - 0.5) * 12;
        shakeY += (Math.random() - 0.5) * 12;
      }
    }

    function spawnDebris(bx, by, color) {
      for (let i = 0; i < 3; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 4;
        debris.push({
          x: bx + Math.random() * BW,
          y: by + Math.random() * BH,
          w: 2 + Math.random() * 4,
          h: 1 + Math.random() * 3,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.3,
          color, alpha: 1
        });
      }
    }

    // ===== 描画 =====
    function draw() {
      ctx.clearRect(0, 0, CW, CH);

      // 画面揺れ
      ctx.save();
      ctx.translate(
        shakeX + (Math.random() - 0.5) * Math.abs(shakeX) * 0.4,
        shakeY + (Math.random() - 0.5) * Math.abs(shakeY) * 0.4
      );

      // ブロック描画（高速化：同じ色をまとめて塗る）
      let prevColor = null;
      for (let i = 0; i < ROWS * COLS; i++) {
        if (!blockAlive[i]) continue;
        const r = (i / COLS) | 0;
        const c = i % COLS;
        const color = ROW_COLORS[r];
        if (color !== prevColor) { ctx.fillStyle = color; prevColor = color; }
        ctx.fillRect(BOX + c * BW + 0.5, BOY + r * BH + 0.5, BW - 1, BH - 1);
      }

      // デブリ
      for (const d of debris) {
        ctx.save();
        ctx.globalAlpha = d.alpha;
        ctx.fillStyle = d.color;
        ctx.translate(d.x, d.y);
        ctx.rotate(d.rotation);
        ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
        ctx.restore();
      }

      // ボールトレイル
      for (let i = ballTrail.length - 1; i >= 0; i--) {
        const t = ballTrail[i];
        const ratio = 1 - i / ballTrail.length;
        ctx.globalAlpha = ratio * 0.5;
        ctx.fillStyle = ball.penetrating
          ? `hsl(${30 + i * 3}, 100%, 65%)`   // 貫通中：オレンジ〜黄色
          : `hsl(${260 + i * 5}, 80%, 75%)`;  // 通常：紫
        ctx.beginPath();
        ctx.arc(t.x, t.y, BALL_R * ratio * 0.9, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // パドル
      const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + PADDLE_H);
      grad.addColorStop(0, '#c4b5fd');
      grad.addColorStop(1, '#7c3aed');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, PADDLE_W, PADDLE_H, 6);
      ctx.fill();

      // ボール（貫通中はオレンジに光る）
      ctx.shadowColor = ball.penetrating ? '#ff9f43' : 'rgba(255,255,255,0.9)';
      ctx.shadowBlur  = ball.penetrating ? 22 : 14;
      ctx.fillStyle   = ball.penetrating ? '#ffd32a' : 'white';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.restore();

      // フラッシュ
      if (flashAlpha > 0.01) {
        ctx.globalAlpha = flashAlpha;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, CW, CH);
        ctx.globalAlpha = 1;
      }
    }

    function updateInfo() {
      document.getElementById('score').textContent    = score;
      document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
    }

    draw();
  </script>
</body>
</html>
