<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブロック崩し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a18;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #c4b5fd; letter-spacing: 2px; }
    #info { font-size: 14px; color: #888; margin-bottom: 10px; }
    #info span { color: white; font-weight: bold; }
    canvas { border-radius: 12px; border: 2px solid #1e1e3a; display: block; }
    #message { margin-top: 14px; font-size: 22px; font-weight: bold; min-height: 30px; color: #c4b5fd; }
    #startBtn {
      margin-top: 10px; padding: 10px 40px; font-size: 15px; font-weight: bold;
      background: #7c3aed; color: white; border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.2s;
    }
    #startBtn:hover { background: #6d28d9; }
    .hint { margin-top: 8px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <h1>🧱 ブロック崩し</h1>
  <div id="info">スコア: <span id="score">0</span></div>
  <canvas id="canvas" width="520" height="430"></canvas>
  <div id="message">スタートを押してね！</div>
  <button id="startBtn" onclick="startGame()">スタート</button>
  <p class="hint">← → キー または マウスでパドルを動かす</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const CW = canvas.width, CH = canvas.height;

    const PADDLE_W = 130, PADDLE_H = 12;
    const BALL_R = 7;
    const ROWS = 9, COLS = 13;
    const BW = 37, BH = 16, BGAP = 2;
    const BOX = 6, BOY = 22;

    const ROW_COLORS = [
      '#ff6b6b','#ff6b6b',
      '#ff9f43','#ff9f43',
      '#ffd32a','#ffd32a',
      '#0be881','#0be881',
      '#4bcffa'
    ];

    let paddle, ball, blocks, debris, ballTrail;
    let score, lives, animId, running;
    let keys = {};
    let shakeX = 0, shakeY = 0;
    let flashAlpha = 0;
    let pendingBreaks = [];

    canvas.addEventListener('mousemove', e => {
      if (!running) return;
      const rect = canvas.getBoundingClientRect();
      paddle.x = e.clientX - rect.left - PADDLE_W / 2;
      paddle.x = Math.max(0, Math.min(CW - PADDLE_W, paddle.x));
    });

    document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
    document.addEventListener('keyup',   e => { keys[e.key] = false; });

    function startGame() {
      if (animId) cancelAnimationFrame(animId);

      score = 0; lives = 3; running = true;
      debris = []; ballTrail = [];
      shakeX = 0; shakeY = 0; flashAlpha = 0;
      pendingBreaks = [];

      paddle = { x: CW / 2 - PADDLE_W / 2, y: CH - 28 };
      resetBall();

      blocks = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          blocks.push({
            r, c,
            x: BOX + c * (BW + BGAP),
            y: BOY + r * (BH + BGAP),
            alive: true,
            color: ROW_COLORS[r]
          });
        }
      }

      document.getElementById('message').textContent = '';
      document.getElementById('startBtn').textContent = 'もう一度';
      updateInfo();
      loop();
    }

    function resetBall() {
      ball = {
        x: CW / 2,
        y: CH / 2 + 60,
        vx: 3.8 * (Math.random() > 0.5 ? 1 : -1),
        vy: -3.8
      };
    }

    function loop() {
      update();
      draw();
      if (running) animId = requestAnimationFrame(loop);
    }

    function update() {
      if (keys['ArrowLeft'])  paddle.x = Math.max(0, paddle.x - 7);
      if (keys['ArrowRight']) paddle.x = Math.min(CW - PADDLE_W, paddle.x + 7);

      // ボールのトレイル記録
      ballTrail.unshift({ x: ball.x, y: ball.y });
      if (ballTrail.length > 18) ballTrail.pop();

      ball.x += ball.vx;
      ball.y += ball.vy;

      // 壁反射
      if (ball.x - BALL_R < 0)   { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
      if (ball.x + BALL_R > CW)  { ball.x = CW - BALL_R; ball.vx = -Math.abs(ball.vx); }
      if (ball.y - BALL_R < 0)   { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

      // 落下
      if (ball.y - BALL_R > CH) {
        lives--;
        updateInfo();
        if (lives <= 0) {
          running = false;
          pendingBreaks = [];
          document.getElementById('message').textContent = 'ゲームオーバー... 😢';
          return;
        }
        resetBall();
        ballTrail = [];
      }

      // パドル反射
      if (
        ball.vy > 0 &&
        ball.y + BALL_R >= paddle.y &&
        ball.y + BALL_R <= paddle.y + PADDLE_H + 6 &&
        ball.x >= paddle.x && ball.x <= paddle.x + PADDLE_W
      ) {
        ball.vy = -Math.abs(ball.vy);
        const hit = (ball.x - (paddle.x + PADDLE_W / 2)) / (PADDLE_W / 2);
        ball.vx = hit * 6;
      }

      // ブロック当たり判定
      for (const b of blocks) {
        if (!b.alive) continue;
        if (
          ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + BW &&
          ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + BH
        ) {
          const ol = (ball.x + BALL_R) - b.x;
          const or2 = (b.x + BW) - (ball.x - BALL_R);
          const ot = (ball.y + BALL_R) - b.y;
          const ob = (b.y + BH) - (ball.y - BALL_R);
          if (Math.min(ol, or2) < Math.min(ot, ob)) ball.vx *= -1;
          else ball.vy *= -1;

          destroyBlock(b, true);
          break;
        }
      }

      // 予約された連鎖破壊を実行
      const now = performance.now();
      for (let i = pendingBreaks.length - 1; i >= 0; i--) {
        const pb = pendingBreaks[i];
        if (now >= pb.time) {
          if (pb.block.alive) destroyBlock(pb.block, false);
          pendingBreaks.splice(i, 1);
        }
      }

      // デブリ物理
      for (const d of debris) {
        d.x  += d.vx;
        d.y  += d.vy;
        d.vy += 0.3;
        d.vx *= 0.98;
        d.rotation += d.rotSpeed;
        d.alpha -= 0.016;
      }
      debris = debris.filter(d => d.alpha > 0 && d.y < CH + 80);

      // エフェクト減衰
      flashAlpha *= 0.82;
      shakeX *= 0.72;
      shakeY *= 0.72;

      // クリア判定
      if (running && blocks.every(b => !b.alive)) {
        running = false;
        document.getElementById('message').textContent = 'クリア！ 🎉';
      }
    }

    function destroyBlock(b, fromBall) {
      if (!b.alive) return;
      b.alive = false;
      score += 10;
      updateInfo();

      spawnDebris(b);

      const s = fromBall ? 4 : 2;
      shakeX += (Math.random() - 0.5) * s * 3;
      shakeY += (Math.random() - 0.5) * s * 3;

      if (fromBall) triggerShockwave(b);
    }

    function triggerShockwave(center) {
      const maxR = 2 + Math.floor(Math.random() * 2);
      let count = 0;

      for (const b of blocks) {
        if (!b.alive) continue;
        const dist = Math.max(Math.abs(b.r - center.r), Math.abs(b.c - center.c));
        if (dist >= 1 && dist <= maxR && Math.random() < 0.55) {
          const delay = dist * 65 + Math.random() * 35;
          pendingBreaks.push({ block: b, time: performance.now() + delay });
          count++;
        }
      }

      if (count >= 4) {
        flashAlpha = Math.min(flashAlpha + 0.35, 0.55);
        shakeX += (Math.random() - 0.5) * 14;
        shakeY += (Math.random() - 0.5) * 14;
      }
    }

    function spawnDebris(b) {
      const cx = b.x + BW / 2;
      const cy = b.y + BH / 2;
      const count = 10;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + Math.random() * 0.8;
        const speed = 1.5 + Math.random() * 5.5;
        debris.push({
          x: cx + (Math.random() - 0.5) * BW * 0.8,
          y: cy + (Math.random() - 0.5) * BH * 0.8,
          w: 3 + Math.random() * 9,
          h: 2 + Math.random() * 5,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1.5,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.28,
          color: b.color,
          alpha: 1
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, CW, CH);

      // 画面揺れ
      const sx = shakeX + (Math.random() - 0.5) * Math.abs(shakeX) * 0.5;
      const sy = shakeY + (Math.random() - 0.5) * Math.abs(shakeY) * 0.5;
      ctx.save();
      ctx.translate(sx, sy);

      // ブロック描画
      for (const b of blocks) {
        if (!b.alive) continue;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, BW, BH, 3);
        ctx.fill();
        // 上部ハイライト（立体感）
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.beginPath();
        ctx.roundRect(b.x + 1, b.y + 1, BW - 2, 5, [3, 3, 0, 0]);
        ctx.fill();
      }

      // デブリ（破片）
      for (const d of debris) {
        ctx.save();
        ctx.globalAlpha = d.alpha;
        ctx.fillStyle = d.color;
        ctx.translate(d.x, d.y);
        ctx.rotate(d.rotation);
        ctx.fillRect(-d.w / 2, -d.h / 2, d.w, d.h);
        ctx.restore();
      }

      // ボールのトレイル
      for (let i = ballTrail.length - 1; i >= 0; i--) {
        const t = ballTrail[i];
        const ratio = 1 - i / ballTrail.length;
        ctx.globalAlpha = ratio * 0.45;
        ctx.fillStyle = `hsl(${260 + i * 5}, 80%, 75%)`;
        ctx.beginPath();
        ctx.arc(t.x, t.y, BALL_R * ratio * 0.85, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // パドル
      const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + PADDLE_H);
      grad.addColorStop(0, '#c4b5fd');
      grad.addColorStop(1, '#7c3aed');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, PADDLE_W, PADDLE_H, 6);
      ctx.fill();

      // ボール（グロー）
      ctx.shadowColor = 'rgba(255,255,255,0.9)';
      ctx.shadowBlur = 16;
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.restore();

      // フラッシュ（白く光る）
      if (flashAlpha > 0.01) {
        ctx.globalAlpha = flashAlpha;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, CW, CH);
        ctx.globalAlpha = 1;
      }
    }

    function updateInfo() {
      document.getElementById('score').textContent = score;
      document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
    }

    draw();
  </script>
</body>
</html>
