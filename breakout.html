<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブロック崩し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      letter-spacing: 2px;
      color: #a78bfa;
    }

    #info {
      display: flex;
      gap: 32px;
      margin-bottom: 10px;
      font-size: 14px;
      color: #ccc;
    }

    #info span { color: white; font-weight: bold; }

    canvas {
      background: #1a1a2e;
      border-radius: 10px;
      display: block;
      border: 2px solid #2d2d4e;
    }

    #message {
      margin-top: 12px;
      font-size: 20px;
      font-weight: bold;
      min-height: 28px;
      color: #a78bfa;
    }

    #startBtn {
      margin-top: 10px;
      padding: 10px 36px;
      font-size: 15px;
      font-weight: bold;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #startBtn:hover { background: #6d28d9; }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }

    .legend {
      margin-top: 6px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>🧱 ブロック崩し</h1>
  <div id="info">
    スコア: <span id="score">0</span>
    残り: <span id="lives">❤️❤️❤️</span>
    コンボ: <span id="combo">×1</span>
  </div>
  <canvas id="canvas" width="520" height="420"></canvas>
  <div id="message">スタートを押してね！</div>
  <button id="startBtn" onclick="startGame()">スタート</button>
  <p class="hint">← → キー または マウスでパドルを動かす</p>
  <p class="legend">💥 爆発ブロック（当たると周囲も崩れる）</p>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const CW = canvas.width, CH = canvas.height;
    const PADDLE_W = 64, PADDLE_H = 10;
    const BALL_R = 6;
    const BLOCK_ROWS = 9, BLOCK_COLS = 13;
    const BLOCK_W = 37, BLOCK_H = 16, BLOCK_GAP = 3;
    const BLOCK_OFFSET_X = 7, BLOCK_OFFSET_Y = 24;

    const ROW_COLORS = [
      '#f87171','#f87171',
      '#fb923c','#fb923c',
      '#facc15','#facc15',
      '#4ade80','#4ade80',
      '#60a5fa'
    ];

    // エフェクト用パーティクル
    let particles = [];

    let paddle, ball, blocks, score, lives, combo, animId, running;
    let keys = {};
    let baseSpeed = 3.8;

    canvas.addEventListener('mousemove', e => {
      if (!running) return;
      const rect = canvas.getBoundingClientRect();
      paddle.x = e.clientX - rect.left - PADDLE_W / 2;
      paddle.x = Math.max(0, Math.min(CW - PADDLE_W, paddle.x));
    });

    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup', e => keys[e.key] = false);

    function startGame() {
      if (animId) cancelAnimationFrame(animId);

      score = 0;
      lives = 3;
      combo = 1;
      running = true;
      particles = [];

      paddle = { x: CW / 2 - PADDLE_W / 2, y: CH - 22 };

      resetBall();

      // ブロック生成（爆弾ブロック約20%）
      blocks = [];
      for (let r = 0; r < BLOCK_ROWS; r++) {
        for (let c = 0; c < BLOCK_COLS; c++) {
          const bomb = Math.random() < 0.18;
          blocks.push({
            r, c,
            x: BLOCK_OFFSET_X + c * (BLOCK_W + BLOCK_GAP),
            y: BLOCK_OFFSET_Y + r * (BLOCK_H + BLOCK_GAP),
            alive: true,
            bomb,
            color: bomb ? '#ff4d4d' : ROW_COLORS[r]
          });
        }
      }

      document.getElementById('message').textContent = '';
      document.getElementById('startBtn').textContent = 'もう一度';
      updateInfo();
      loop();
    }

    function resetBall() {
      ball = {
        x: CW / 2,
        y: CH / 2 + 40,
        vx: baseSpeed * (Math.random() > 0.5 ? 1 : -1),
        vy: -baseSpeed
      };
    }

    function loop() {
      update();
      draw();
      if (running) animId = requestAnimationFrame(loop);
    }

    function update() {
      if (keys['ArrowLeft'])  paddle.x = Math.max(0, paddle.x - 7);
      if (keys['ArrowRight']) paddle.x = Math.min(CW - PADDLE_W, paddle.x + 7);

      ball.x += ball.vx;
      ball.y += ball.vy;

      // 壁反射
      if (ball.x - BALL_R < 0)       { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
      if (ball.x + BALL_R > CW)      { ball.x = CW - BALL_R; ball.vx = -Math.abs(ball.vx); }
      if (ball.y - BALL_R < 0)       { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

      // 落下
      if (ball.y - BALL_R > CH) {
        lives--;
        combo = 1;
        updateInfo();
        if (lives <= 0) {
          running = false;
          document.getElementById('message').textContent = 'ゲームオーバー... 😢';
          return;
        }
        resetBall();
      }

      // パドル反射
      if (
        ball.vy > 0 &&
        ball.y + BALL_R >= paddle.y &&
        ball.y - BALL_R <= paddle.y + PADDLE_H &&
        ball.x >= paddle.x - 4 &&
        ball.x <= paddle.x + PADDLE_W + 4
      ) {
        ball.vy = -Math.abs(ball.vy);
        const hit = (ball.x - (paddle.x + PADDLE_W / 2)) / (PADDLE_W / 2);
        ball.vx = hit * 6;
        combo = 1;
      }

      // ブロック当たり判定
      for (const b of blocks) {
        if (!b.alive) continue;
        if (
          ball.x + BALL_R > b.x &&
          ball.x - BALL_R < b.x + BLOCK_W &&
          ball.y + BALL_R > b.y &&
          ball.y - BALL_R < b.y + BLOCK_H
        ) {
          // どの面に当たったか判定
          const overlapL = (ball.x + BALL_R) - b.x;
          const overlapR = (b.x + BLOCK_W) - (ball.x - BALL_R);
          const overlapT = (ball.y + BALL_R) - b.y;
          const overlapB = (b.y + BLOCK_H) - (ball.y - BALL_R);
          const minH = Math.min(overlapL, overlapR);
          const minV = Math.min(overlapT, overlapB);
          if (minH < minV) ball.vx *= -1; else ball.vy *= -1;

          breakBlock(b);
          updateInfo();

          if (blocks.every(b => !b.alive)) {
            running = false;
            document.getElementById('message').textContent = 'クリア！すごい！🎉';
          }
          break;
        }
      }

      // パーティクル更新
      particles = particles.filter(p => p.life > 0);
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life--;
      }
    }

    function breakBlock(b) {
      b.alive = false;
      score += 10 * combo;
      combo++;
      spawnParticles(b.x + BLOCK_W / 2, b.y + BLOCK_H / 2, b.color, b.bomb ? 20 : 8);

      if (b.bomb) {
        // 爆発：周囲3×3を巻き込む
        for (const other of blocks) {
          if (!other.alive) continue;
          if (Math.abs(other.r - b.r) <= 1 && Math.abs(other.c - b.c) <= 1) {
            other.alive = false;
            score += 10 * combo;
            combo++;
            spawnParticles(other.x + BLOCK_W / 2, other.y + BLOCK_H / 2, other.color, 6);
          }
        }
        // ボールをちょっとだけ速くする
        const speed = Math.hypot(ball.vx, ball.vy);
        const newSpeed = Math.min(speed + 0.4, 9);
        ball.vx = (ball.vx / speed) * newSpeed;
        ball.vy = (ball.vy / speed) * newSpeed;
      }
    }

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          color,
          life: 30 + Math.random() * 20,
          size: Math.random() * 4 + 2
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, CW, CH);

      // ブロック描画
      for (const b of blocks) {
        if (!b.alive) continue;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, BLOCK_W, BLOCK_H, 3);
        ctx.fill();

        if (b.bomb) {
          ctx.font = `${BLOCK_H - 4}px serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('💥', b.x + BLOCK_W / 2, b.y + BLOCK_H / 2);
        }
      }

      // パーティクル描画
      for (const p of particles) {
        ctx.globalAlpha = p.life / 50;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // パドル
      ctx.fillStyle = '#a78bfa';
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, PADDLE_W, PADDLE_H, 5);
      ctx.fill();

      // ボール（光彩付き）
      ctx.shadowColor = 'white';
      ctx.shadowBlur = 10;
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function updateInfo() {
      document.getElementById('score').textContent = score;
      document.getElementById('lives').textContent = '❤️'.repeat(lives);
      document.getElementById('combo').textContent = `×${combo}`;
    }

    draw();
  </script>
</body>
</html>
